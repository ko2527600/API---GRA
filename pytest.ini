[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
env =
    ENVIRONMENT=testing
    DATABASE_URL=sqlite:///:memory:
    ENCRYPTION_KEY=test-encryption-key-for-testing-only-12345
    API_SECRET_KEY=test-secret-key-for-testing-only
    DEBUG=True
